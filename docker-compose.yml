services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: vending_php
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html

  nginx:
    image: nginx:1.27-alpine
    container_name: vending_nginx
    restart: unless-stopped
    depends_on:
      - php
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  mysql:
    image: mysql:8.0
    container_name: vending_mysql
    restart: unless-stopped
    env_file:
      - ./.env.docker
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
